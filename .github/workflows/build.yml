name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            release_name: lmu-geoscience-tools-linux.zip
          - os: macos-latest
            release_name: lmu-geoscience-tools-macos.zip
          - os: windows-latest
            release_name: lmu-geoscience-tools-windows.zip

    steps:
      - uses: actions/checkout@v4

      # ── Non-macOS: use setup-python normally ──────────────────────────
      - name: Set up Python (Linux/Windows)
        if: matrix.os != 'macos-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── macOS: build x86_64 binary using arch emulation ──────────────
      # arch -x86_64 forces pip to download x86_64 wheels → binary runs on
      # Intel natively AND on Apple Silicon transparently via Rosetta 2.
      - name: Install universal2 Python (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # Install Rosetta 2 so we can emulate x86_64 on this arm64 runner
          softwareupdate --install-rosetta --agree-to-license || true
          # Download universal2 Python (supports both arch -x86_64 and native arm64)
          curl -fLO "https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg"
          sudo installer -pkg python-3.11.9-macos11.pkg -target /

      - name: Install dependencies (macOS x86_64)
        if: matrix.os == 'macos-latest'
        run: |
          PY="/Library/Frameworks/Python.framework/Versions/3.11/bin/python3.11"
          arch -x86_64 "$PY" -m pip install --upgrade pip
          arch -x86_64 "$PY" -m pip install PyQt6 pyinstaller pandas openpyxl matplotlib pyrolite pyyaml

      # ── Linux/Windows: use regular python ────────────────────────────
      - name: Install dependencies (Linux/Windows)
        if: matrix.os != 'macos-latest'
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pyinstaller pandas openpyxl matplotlib pyrolite pyyaml

      - name: Build with PyInstaller (macOS x86_64)
        if: matrix.os == 'macos-latest'
        run: |
          PY="/Library/Frameworks/Python.framework/Versions/3.11/bin/python3.11"
          arch -x86_64 "$PY" -m PyInstaller lmu-geoscience-tools.spec

      - name: Build with PyInstaller (Linux/Windows)
        if: matrix.os != 'macos-latest'
        run: pyinstaller lmu-geoscience-tools.spec

      # ── Linux: zip the onedir ──────────────────────────────────────────
      - name: Prepare binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cd dist
          zip -ry "../${{ matrix.release_name }}" lmu-geoscience-tools/
          cd ..
          mv "${{ matrix.release_name }}" "dist/${{ matrix.release_name }}"

      # ── macOS: zip the .app bundle ────────────────────────────────────
      - name: Prepare binary (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd dist
          zip -ry "../${{ matrix.release_name }}" "LMU Geoscience Tools.app"
          cd ..
          mv "${{ matrix.release_name }}" "dist/${{ matrix.release_name }}"

      # ── Windows: zip the onedir ──────────────────────────────────────────
      - name: Prepare binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          Compress-Archive -Path dist\lmu-geoscience-tools\* -DestinationPath dist\${{ matrix.release_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.release_name }}
          path: dist/${{ matrix.release_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/lmu-geoscience-tools-linux.zip/lmu-geoscience-tools-linux.zip
            artifacts/lmu-geoscience-tools-macos.zip/lmu-geoscience-tools-macos.zip
            artifacts/lmu-geoscience-tools-windows.zip/lmu-geoscience-tools-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
