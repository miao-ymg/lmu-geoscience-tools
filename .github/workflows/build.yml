name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: lmu-geoscience-tools
            asset_name: lmu-geoscience-tools-linux
          - os: macos-latest
            artifact_name: lmu-geoscience-tools
            asset_name: lmu-geoscience-tools-macos
          - os: windows-latest
            artifact_name: lmu-geoscience-tools.exe
            asset_name: lmu-geoscience-tools-windows.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller lmu-geoscience-tools.spec

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/lmu-geoscience-tools-linux/lmu-geoscience-tools
            artifacts/lmu-geoscience-tools-macos/lmu-geoscience-tools
            artifacts/lmu-geoscience-tools-windows.exe/lmu-geoscience-tools.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
